<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Temporal Monolith - Active Timer</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;700;900&amp;family=Manrope:wght@300;400;600;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-secondary-container": "#5b3800",
                    "surface-container-highest": "#353534",
                    "on-tertiary-fixed-variant": "#930013",
                    "surface-dim": "#131313",
                    "surface-bright": "#3a3939",
                    "on-secondary-fixed": "#2a1700",
                    "on-primary-container": "#00563b",
                    "primary-container": "#34d399",
                    "on-tertiary-container": "#9a0015",
                    "secondary-fixed": "#ffddb8",
                    "on-secondary-fixed-variant": "#653e00",
                    "inverse-primary": "#006c4b",
                    "on-tertiary": "#68000a",
                    "on-primary": "#003825",
                    "surface-container-high": "#2a2a2a",
                    "error-container": "#93000a",
                    "on-surface": "#e5e2e1",
                    "tertiary-fixed-dim": "#ffb3ad",
                    "on-primary-fixed-variant": "#005137",
                    "on-error": "#690005",
                    "surface-container-low": "#1c1b1b",
                    "secondary-container": "#ee9800",
                    "on-primary-fixed": "#002114",
                    "primary-fixed-dim": "#45dfa4",
                    "outline": "#85948b",
                    "inverse-on-surface": "#313030",
                    "surface-container-lowest": "#0e0e0e",
                    "error": "#ffb4ab",
                    "on-surface-variant": "#bbcac0",
                    "tertiary-fixed": "#ffdad7",
                    "surface-container": "#201f1f",
                    "primary": "#5af0b3",
                    "on-tertiary-fixed": "#410004",
                    "outline-variant": "#3c4a42",
                    "on-error-container": "#ffdad6",
                    "on-background": "#e5e2e1",
                    "surface-variant": "#353534",
                    "background": "#131313",
                    "secondary": "#ffb95f",
                    "tertiary-container": "#ffa29b",
                    "primary-fixed": "#68fcbf",
                    "surface-tint": "#45dfa4",
                    "secondary-fixed-dim": "#ffb95f",
                    "inverse-surface": "#e5e2e1",
                    "surface": "#131313",
                    "tertiary": "#ffcac5",
                    "on-secondary": "#472a00"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Space Grotesk"],
                    "body": ["Manrope"],
                    "label": ["Manrope"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .monolith-glow {
            background: radial-gradient(circle at center, rgba(90, 240, 179, 0.15) 0%, transparent 70%);
        }
        .aura-bar {
            height: 4px;
            width: 100%;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 100;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body selection:bg-primary selection:text-on-primary">
<!-- Progress Aura (Visual Tonal Shift) -->
<div class="aura-bar bg-primary shadow-[0_0_15px_rgba(90,240,179,0.5)]"></div>
<!-- Top Navigation Shell -->
<header class="fixed top-0 w-full z-50 bg-[#131313]">
<div class="flex justify-between items-center px-6 h-16 w-full max-w-screen-xl mx-auto">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-[#5af0b3] hover:opacity-80 transition-opacity cursor-pointer">menu</span>
<span class="text-xl font-black tracking-tighter text-[#5af0b3] font-headline uppercase">TEMPORAL</span>
</div>
<div class="flex items-center gap-6">
<!-- Status Pill -->
<div class="hidden md:flex items-center gap-2 bg-surface-container-low px-4 py-1.5 rounded-full">
<div class="w-2 h-2 rounded-full bg-primary animate-pulse"></div>
<span class="font-label text-[10px] uppercase tracking-widest font-bold text-primary">On Track</span>
</div>
<span class="material-symbols-outlined text-[#E5E2E1] hover:opacity-80 transition-opacity cursor-pointer">settings</span>
</div>
</div>
<div class="bg-[#1C1B1B] h-[1px] w-full opacity-10"></div>
</header>
<!-- Main Content Canvas -->
<main class="min-h-screen flex flex-col items-center justify-center relative overflow-hidden px-6 pt-16 pb-24">
<!-- Atmospheric Background Glow -->
<div class="absolute inset-0 monolith-glow pointer-events-none"></div>
<!-- Semantic Active Context (Internal Label) -->
<div class="mb-12 text-center">
<span class="font-label text-xs uppercase tracking-[0.3em] font-extrabold text-primary block mb-2 opacity-60">Session in progress</span>
<h2 class="text-on-surface-variant font-headline text-lg tracking-tight font-medium">System Architecture Focus</h2>
</div>
<!-- The Monolith Timer -->
<section class="relative z-10 flex flex-col items-center justify-center">
<div class="relative">
<!-- Massive Scale Shock Typography -->
<h1 class="text-[clamp(6rem,20vw,16rem)] font-headline font-black tracking-tighter text-on-surface leading-none select-none">
                    24:59
                </h1>
<!-- Subtle Gradient Pulse Overlay -->
<div class="absolute inset-0 bg-gradient-to-t from-primary/10 to-transparent blur-3xl -z-10 opacity-50"></div>
</div>
<!-- Secondary Data Point -->
<div class="mt-8 flex flex-col items-center">
<div class="h-1 w-24 bg-primary/20 rounded-full mb-4">
<div class="h-full w-3/4 bg-primary rounded-full"></div>
</div>
<p class="font-label text-[10px] uppercase tracking-[0.2em] text-outline">Task completion: 75%</p>
</div>
</section>
<!-- Asymmetric Detail Cards (Bento style integration) -->
<div class="mt-20 w-full max-w-4xl grid grid-cols-1 md:grid-cols-3 gap-6">
<div class="md:col-span-2 bg-surface-container-low p-8 rounded-xl flex items-end justify-between group transition-all duration-500 hover:bg-surface-container">
<div>
<span class="font-label text-[10px] uppercase tracking-widest text-outline block mb-4">Current Milestones</span>
<ul class="space-y-3">
<li class="flex items-center gap-3 text-sm text-on-surface">
<span class="material-symbols-outlined text-primary text-lg" style="font-variation-settings: 'FILL' 1;">check_circle</span>
                            Define Data Schema
                        </li>
<li class="flex items-center gap-3 text-sm text-on-surface/60">
<span class="material-symbols-outlined text-outline text-lg">radio_button_unchecked</span>
                            Implement API Endpoints
                        </li>
</ul>
</div>
<div class="text-right">
<span class="text-4xl font-headline font-bold text-on-surface/20 group-hover:text-primary/20 transition-colors duration-500">01</span>
</div>
</div>
<div class="bg-surface-container-high p-8 rounded-xl flex flex-col justify-between">
<span class="font-label text-[10px] uppercase tracking-widest text-outline block">Next Break</span>
<div>
<span class="text-3xl font-headline font-bold text-on-surface">05:00</span>
<p class="text-xs text-outline mt-1 font-label uppercase tracking-wider">Hydration Interval</p>
</div>
</div>
</div>
</main>
<!-- Floating Core Controls (Tactile Buttons) -->
<div class="fixed bottom-12 left-1/2 -translate-x-1/2 z-50 flex items-center gap-4">
<!-- Stop Button -->
<button class="w-16 h-16 rounded-full bg-surface-container-highest flex items-center justify-center text-on-surface hover:bg-error/10 hover:text-error transition-all duration-300 active:scale-90 group">
<span class="material-symbols-outlined text-3xl group-hover:fill-current" style="font-variation-settings: 'FILL' 0;">stop</span>
</button>
<!-- Pause/Play Button (Primary) -->
<button class="w-24 h-24 rounded-full bg-primary flex items-center justify-center text-on-primary shadow-2xl shadow-primary/20 hover:scale-105 active:scale-95 transition-all duration-300">
<span class="material-symbols-outlined text-5xl" style="font-variation-settings: 'FILL' 1;">pause</span>
</button>
<!-- Add Time Button (Secondary) -->
<button class="w-16 h-16 rounded-full bg-surface-container-highest flex items-center justify-center text-on-surface hover:bg-primary/10 hover:text-primary transition-all duration-300 active:scale-90">
<span class="material-symbols-outlined text-3xl">add</span>
</button>
</div>
<!-- Bottom Navigation Shell (Mobile Only) -->
<nav class="md:hidden fixed bottom-0 w-full z-50 pb-safe bg-[#131313]/90 backdrop-blur-xl">
<div class="flex justify-around items-center px-8 h-20 w-full shadow-[0_-8px_32px_rgba(90,240,179,0.04)]">
<div class="flex flex-col items-center justify-center text-[#85948B] w-12 h-12 hover:text-[#5af0b3] transition-colors">
<span class="material-symbols-outlined">add_circle</span>
</div>
<!-- Active Timer Tab -->
<div class="flex flex-col items-center justify-center bg-[#5af0b3] text-[#003825] rounded-full w-12 h-12 mb-2 scale-95 active:scale-90 duration-200">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">timer</span>
</div>
<div class="flex flex-col items-center justify-center text-[#85948B] w-12 h-12 hover:text-[#5af0b3] transition-colors">
<span class="material-symbols-outlined">history</span>
</div>
</div>
</nav>
</body></html>
